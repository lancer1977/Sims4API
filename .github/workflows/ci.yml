name: ci

on:
  push:
    branches: [main]
    paths:
      - "Sims4.Core/**"
      - "Sims4.SignalR/**"
      - "Tests/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "Sims4.Core/**"
      - "Sims4.SignalR/**"
      - "Tests/**"
      - ".github/workflows/ci.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Configure NuGet
        run: |
          cat > NuGet.Config <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="github" value="https://nuget.pkg.github.com/lancer1977/index.json" />
              <add key="nuget.org" value="https://api.nuget.org/v3/index.json" />
            </packageSources>
            <packageSourceCredentials>
              <github>
                <add key="Username" value="lancer1977" />
                <add key="ClearTextPassword" value="${GHCR_TOKEN}" />
              </github>
            </packageSourceCredentials>
          </configuration>
          EOF
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
      - run: dotnet restore Api.Sims4.sln --configfile NuGet.Config
      - run: dotnet build Api.Sims4.sln --configuration Release --no-restore
      - run: dotnet pack Sims4.Core/PolyhydraGames.Sims4.Core.csproj --configuration Release --no-build --output ./artifacts -p:PackageVersion=${{ github.run_number }}
